name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23333333&color_dots=%23f5f5f5,%23d4d4d4,%23a3a3a3,%23737373,%23404040
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23e5e5e5&color_dots=%230d0d0d,%23262626,%23525252,%23737373,%23a3a3a3

      - name: Publish snake animation
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
